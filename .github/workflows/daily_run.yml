name: Daily Stock Insight

on:
  # schedule:  # 비활성화: YouTube 봇 차단으로 인해 수동 수집으로 전환
  #   - cron: '0 23 * * *'  # 매일 한국 시간 오전 8시 (UTC 23:00)
  workflow_dispatch:  # 수동 실행만 가능

jobs:
  run-script:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.12'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        # 유튜브 연동 라이브러리는 최신 버전 유지가 중요하므로 강제 업데이트
        pip install --upgrade youtube-transcript-api yt-dlp

    - name: Create credentials file
      # GitHub Secret에 저장된 JSON 내용을 파일로 생성
      # main.py가 이 파일을 읽어서 구글 시트에 접근합니다.
      env:
        GOOGLE_CREDENTIALS_JSON: ${{ secrets.GOOGLE_CREDENTIALS_JSON_CONTENT }}
      run: |
        if [ -z "$GOOGLE_CREDENTIALS_JSON" ]; then
          echo "Error: GOOGLE_CREDENTIALS_JSON_CONTENT secret is empty!"
          exit 1
        fi
        echo "$GOOGLE_CREDENTIALS_JSON" > service_account.json

    - name: Run automation script
      env:
        YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
        OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        TARGET_CHANNEL_ID_LIST: ${{ secrets.TARGET_CHANNEL_ID_LIST }}
        SPREADSHEET_URL: ${{ secrets.SPREADSHEET_URL }}
        # 파일 경로는 위에서 생성한 파일명과 일치해야 함
        GOOGLE_SHEETS_CREDENTIALS_JSON: ./service_account.json
      run: python main.py
