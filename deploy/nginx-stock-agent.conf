# Nginx 리버스 프록시 설정 — Streamlit (WebSocket 지원 필수)
# 설치: sudo cp deploy/nginx-stock-agent.conf /etc/nginx/sites-available/stock-agent
#       sudo ln -s /etc/nginx/sites-available/stock-agent /etc/nginx/sites-enabled/
#       sudo nginx -t && sudo systemctl reload nginx
# HTTPS: sudo certbot --nginx -d yourdomain.com  (Let's Encrypt가 이 파일을 자동 수정)

server {
    listen 80;
    server_name yourdomain.com;  # ← 본인 도메인 또는 서버 공인 IP로 변경

    # 도메인 없이 IP로만 쓸 경우: server_name _;

    location / {
        proxy_pass http://127.0.0.1:8501;
        proxy_http_version 1.1;

        # Streamlit WebSocket 필수 헤더
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_read_timeout 86400;
    }
}
